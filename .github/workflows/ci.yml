name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @lobster-world/server test

  test-smoke:
    name: Smoke Tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lobster_world_test
          POSTGRES_USER: lobster
          POSTGRES_PASSWORD: lobster_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lobster -d lobster_world_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://lobster:lobster_ci@localhost:5432/lobster_world_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Initialize database schema
        run: psql "$TEST_DATABASE_URL" -f scripts/init-db.sql

      - name: Run seed script
        run: pnpm -F @lobster-world/server db:seed
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Run smoke tests
        run: pnpm -F @lobster-world/server test:smoke

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test-unit, test-smoke]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
