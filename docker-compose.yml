services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lobster_world
      POSTGRES_USER: lobster
      POSTGRES_PASSWORD: lobster_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lobster -d lobster_world"]
      interval: 5s
      timeout: 3s
      retries: 5

  lobster-world:
    build: .
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - DATABASE_URL=postgres://lobster:lobster_dev@db:5432/lobster_world
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  pgdata:
